<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine - Sistema de Reservas</title>
    <link rel="stylesheet" href="assets/css/estilos.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1>Cine</h1>
            <p>Sistema de Gestión y Reserva de Entradas</p>
        </div>
    </header>

    <main class="dashboard-layout">
        
        <section class="admin-section">
            <h2 class="section-title">Nueva Reserva de Entradas</h2>
            
            <div id="validation-alert" class="validation-box hidden"></div>

            <form id="reservation-form" class="admin-form" novalidate>
                <div class="form-group">
                    <label for="client-name">Nombre del Cliente</label>
                    <input type="text" id="client-name" placeholder="Ej: Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="movie-title">Película</label>
                    <input type="text" id="movie-title" placeholder="Ej: Superman">
                </div>
                <div class="form-group">
                    <label for="ticket-quantity">Cantidad de Entradas</label>
                    <input type="number" id="ticket-quantity" min="1" placeholder="Ej: 2">
                </div>
                <button type="submit" id="btn-reserve" class="btn-submit">Confirmar Reserva</button>
            </form>
        </section>

        <section class="results-section">
            <h2 class="section-title">Reservas Registradas</h2>
            <div style="text-align: right; margin-bottom: 1rem;">
                <button id="btn-clear-all" class="btn-delete" style="width: auto; padding: 0.5rem 1rem;">Eliminar Todas las Reservas</button>
            </div>
            <div id="reservations-list" class="games-grid">
                </div>
        </section>

        <section id="summary-container" class="summary-wrapper">
            </section>

    </main>

    <script src="assets/js/script.js"></script>
</body>
</html>
